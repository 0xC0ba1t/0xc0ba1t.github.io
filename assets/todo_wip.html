    <script>
      const lines = [
        "man: this page is on the TODO list",
        "Check back later, or see the home page below.",
      ];
      const typedText = document.getElementById("typedText");
      const seeAlso = document.getElementById("seeAlso");
      const knownBugs = document.getElementById("knownBugs");

      let lineIndex = 0;
      let charIndex = 0;
      let buffer = "";

      function typeStep() {
        if (lineIndex >= lines.length) {
          seeAlso.style.transition = "opacity 0.3s ease";
          knownBugs.style.transition = "opacity 0.3s ease";
          requestAnimationFrame(() => {
            seeAlso.style.opacity = "1";
            knownBugs.style.opacity = "1";
          });
          return;
        }
        const currentLine = lines[lineIndex];
        if (charIndex <= currentLine.length) {
          typedText.innerText = buffer + currentLine.slice(0, charIndex);
          charIndex++;
          setTimeout(typeStep, 28);
        } else {
          buffer += currentLine + "\n";
          lineIndex++;
          charIndex = 0;
          setTimeout(typeStep, 350);
        }
      }

      setTimeout(typeStep, 300);
    </script>
